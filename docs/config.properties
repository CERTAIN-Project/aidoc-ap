abstract=AIDOC-AP is an application profile for representing the technical documentation of AI systems required under Article 11 and Annex IV of the EU AI Act in a structured, machine-readable form. It reuses established Semantic Web vocabularies (PROV-O, DCAT, MLSchema, AIRO, VAIR, DPV) where possible and adds Annex IV-specific terms, so that provider documentation - system architecture, data, training/validation/testing, risk, performance and lifecycle information - can be captured as a knowledge graph and checked for completeness against the regulation. The profile is developed with an LLM-assisted, competency-question-driven pipeline and validated on real pilot systems from the CERTAIN project.
