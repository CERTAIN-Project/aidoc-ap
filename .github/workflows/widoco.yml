name: Build & Deploy Widoco

on:
  push:
    branches: [ main ]
    paths:
      - "aidoc-ap.ttl"
      - "annex_4.ttl"
      - "docs/**"
      - ".github/workflows/widoco.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history + tags for the versioned ontology snapshots

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Cache Widoco
        id: cache-widoco
        uses: actions/cache@v4
        with:
          path: widoco/
          key: widoco-1.4.25-jdk17

      - name: Download Widoco (JDK 17)
        if: steps.cache-widoco.outputs.cache-hit != 'true'
        run: |
          mkdir -p widoco
          curl -L -o widoco/widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            https://github.com/dgarijo/Widoco/releases/download/v1.4.25/widoco-1.4.25-jar-with-dependencies_JDK-17.jar

      - name: Build docs with Widoco
        run: |
          rm -rf site
          mkdir -p site
          java -Xmx1G -jar widoco/widoco-1.4.25-jar-with-dependencies_JDK-17.jar \
            -ontFile aidoc-ap.ttl \
            -outFolder site \
            -includeAnnotationProperties \
            -includeImportedOntologies \
            -confFile docs/config.properties \
            -rewriteAll \
            -webVowl \
            -oops \
            -excludeProvenance \
            -noPlaceHolderText \
            -uniteSections
          touch site/.nojekyll
          cp site/index-en.html site/index.html
          mkdir -p site/resources site/assets
          cp docs/resources/* site/resources/
          cp docs/assets/* site/assets/
          cp docs/overview.html site/overview.html
          cp docs/coverage.html site/coverage.html
          cp docs/alignments.html site/alignments.html
          cp docs/requirements.html site/requirements.html
          cp docs/curation.html site/curation.html
          cp docs/alignments.json site/alignments.json
          cp annex_4.ttl site/annex_4.ttl

      # Versioned snapshots so the owl:versionIRIs (https://w3id.org/aidoc-ap/<x.y>)
      # resolve: /<x.y>/ontology.ttl is the ontology at git tag v<x.y>,
      # /<x.y>/ a small landing page.
      - name: Publish versioned ontology snapshots
        run: |
          for tag in $(git tag -l 'v*'); do
            v="${tag#v}"
            mkdir -p "site/$v"
            git show "$tag:aidoc-ap.ttl" > "site/$v/ontology.ttl"
            cat > "site/$v/index.html" <<EOF
          <!doctype html>
          <html lang="en"><head><meta charset="utf-8">
          <title>AIDOC-AP $v</title>
          <meta name="viewport" content="width=device-width, initial-scale=1">
          <style>body{font:16px/1.6 -apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;max-width:44rem;margin:8vh auto;padding:0 1.2rem;color:#1c2430}
          a{color:#155e9e}</style></head><body>
          <h1>AIDOC-AP &mdash; version $v</h1>
          <p>Archived snapshot of the AIDOC-AP ontology at release <code>$tag</code>.</p>
          <ul>
            <li><a href="ontology.ttl">ontology.ttl</a> (Turtle, this version)</li>
            <li><a href="../">Current documentation</a></li>
            <li><a href="https://github.com/CERTAIN-Project/aidoc-ap/tree/$tag">Source at tag $tag</a></li>
          </ul>
          </body></html>
          EOF
          done
          ls -R site/1.* || true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
